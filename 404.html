<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Constraint Spine</title>
<meta name="robots" content="noindex"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&family=JetBrains+Mono:wght@400;500&family=Manrope:wght@500;700&display=swap" rel="stylesheet"/>
<style>
:root { --bg:#0d0d10; --cream:#e8e3d6; --gold:#c9a227; --gold-dim:rgba(201,162,39,0.4); --dim:#888; --border:#2a2a2a; --surface:#16161a; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font: 16px/1.5 'Space Grotesk', system-ui, sans-serif; background: var(--bg); color: var(--cream); display: grid; place-items: center; min-height: 100vh; padding: 24px; }
.box { text-align: center; max-width: 480px; padding: 32px; background: var(--surface); border: 1px solid var(--border); }
.code { font-family: 'Manrope', sans-serif; font-size: 88px; font-weight: 500; line-height: 1; color: var(--gold); margin: 0; letter-spacing: -0.03em; }
h1 { font-family: 'Manrope', sans-serif; font-size: 20px; font-weight: 500; margin: 16px 0 8px; }
p { color: var(--dim); margin: 12px 0 28px; font-size: 14px; line-height: 1.7; }
.stamp { display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); border: 1px solid var(--gold-dim); padding: 10px 22px; text-decoration: none; transition: all 0.2s; }
.stamp:hover { background: rgba(201,162,39,0.08); border-color: var(--gold); }
</style>
</head>
<body>
<div class="box">
<p class="code">404</p>
<h1>Sequence not found.</h1>
<p>This path is not part of the Constraint Spine.</p>
<a class="stamp" href="/">Return to spine</a>
</div>
</body>
</html>
